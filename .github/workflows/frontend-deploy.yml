name: Frontend Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload build files to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Notify Discord deploy success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{
              \"content\": \"✅[FRONTED] 배포 성공\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nURL: https://d27bvnjwx94rj6.cloudfront.net\"
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord deploy failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{
              \"content\": \"❌[FRONTEND] 배포 실패\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nActions 확인 필요\"
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
